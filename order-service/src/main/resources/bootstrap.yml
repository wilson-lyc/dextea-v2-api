server:
  port: ${SERVER_PORT:8088} # 端口

spring:
  application:
    name: order-service # 应用名称
  jackson:
    default-property-inclusion: always
  cloud:
    nacos:
      # 鉴权配置
      username: ${NACOS_USERNAME:nacos} # 账号
      password: ${NACOS_PASSWORD:LYC1208@nacos}  # 密码
      # nacos地址
      server-addr: ${NACOS_URL:localhost:8848}
      # 服务注册
      discovery:
        namespace: ${NACOS_DISCOVERY_NAMESPACE:dextea} # 命名空间
        group: ${NACOS_DISCOVERY_GROUP:DEFAULT_GROUP}  # 分组
      # 配置中心
      config:
        namespace: ${NACOS_CONFIG_NAMESPACE:dextea} # 命名空间
        group: ${NACOS_CONFIG_GROUP:DEFAULT_GROUP}  # 分组
        file-extension: ${NACOS_CONFIG_FILE_EXTENSION:yaml} # 配置文件扩展名
        refresh-enabled: ${NACOS_CONFIG_REFRESH:true} # 是否启用自动刷新
        shared-configs: ${NACOS_SHARED_CONFIGS:} # 共享配置（可选）
        extension-configs: ${NACOS_EXTENSION_CONFIGS:} # 扩展配置（可选）
